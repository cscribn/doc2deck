# Copy to presentation-keys.properties and customize locally (not source controlled).
# Set VOICE_STYLE_PATH in .env for tone (default: prompts/voice-styles/neutral.md; TEDx: prompts/voice-styles/tedx.md).
presentationKeys.header=PRESENTATION KEYS (fill each from DOCX content; slide fragments only; voice from VOICE_STYLE_PATH). Hard word limits: output is rejected if any key exceeds its limit.

shortProjectDescription.maxWords=10
shortProjectDescription=One hook fragment, 4-10 words max (hard limit 10). Describe the initiative, not the project name.

problem1.maxWords=15
problem1=First problem beat; one fragment, 8-15 words (hard limit 15); vivid stakes.
problem2.maxWords=15
problem2=Second problem beat; one fragment, 8-15 words (hard limit 15); deepen tension; do not repeat problem1.
persona.maxWords=15
persona=Who has this problem? One fragment, 6-12 words (hard limit 15); concrete and relatable.
currentSolution1.maxWords=15
currentSolution1=Today's workaround; one fragment, 8-15 words (hard limit 15).
currentSolution2.maxWords=15
currentSolution2=Second workaround; one fragment, 8-15 words (hard limit 15).
scale.maxWords=18
scale=Scale of the problem; 1-2 fragments (8-18 words total, hard limit 18); lead with a number or contrast.
whyNow.maxWords=18
whyNow=Why solve now; 1-2 fragments (8-18 words total, hard limit 18); urgency without exaggerating.
ifUnsolved.maxWords=18
ifUnsolved=Cost of inaction; 1-2 fragments (8-18 words total, hard limit 18).
architectureApproach.maxWords=25
architectureApproach=Solution architecture; 2-3 fragments joined by semicolons (15-25 words total, hard limit 25); the story turn.
approachReasons.maxWords=25
approachReasons=Why this approach; 2-3 fragments joined by semicolons (15-25 words total, hard limit 25).
personaBetterment.maxWords=18
personaBetterment=Persona payoff; 1-2 fragments (8-18 words total, hard limit 18).
appfireBetterment.maxWords=18
appfireBetterment=Organization value (time, customers, retention); 1-2 fragments (8-18 words total, hard limit 18).
estimatedImpact.maxWords=25
estimatedImpact=Impact with rationale; 2-3 fragments joined by semicolons (15-25 words total, hard limit 25).
currentState.maxWords=18
currentState=Current solution state; 1-2 fragments (8-18 words total, hard limit 18).
sprintsToDeliver.maxWords=10
sprintsToDeliver=Sprints to production; one fragment, 4-10 words (hard limit 10, 2-week sprints).
nonDevCosts.optional=true
nonDevCosts.maxWords=18
nonDevCosts=Optional non-dev costs; 1-2 fragments (8-18 words total, hard limit 18) if applicable. Omit the key entirely when not applicable.
problemSolvingImg.type=image
problemSolvingImg.maxWords=5
problemSolvingImg=Search phrase evoking a dramatic engineering breakthrough or impossible problem cracked.
architectureApproachImg.type=image
architectureApproachImg.maxWords=5
architectureApproachImg=Search phrase evoking bold architecture planning or a complex system taking shape.
valueImpactImg.type=image
valueImpactImg.maxWords=5
valueImpactImg=Search phrase evoking engineers delivering visible, high-impact results.
